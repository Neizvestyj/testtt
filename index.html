
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Accordion</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #1a1a1a;
      font-family: 'Segoe UI', sans-serif;
      color: white;
    }
    .accordion {
      width: 320px;
      cursor: pointer;
      perspective: 1000px;
    }
    .head {
      background: #2d2d2d;
      padding: 20px;
      border-radius: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 600;
      z-index: 10;
      position: relative;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      transition: background 0.3s;
    }
    .head:hover {
      background: #3d3d3d;
    }
    .icon {
      font-size: 20px;
      transition: transform 0.4s;
    }
    .body {
      background: #6c5ce7; 
      padding: 20px;
      margin-top: -10px; 
      border-radius: 0 0 12px 12px;
      transform-origin: top center;
      transform: rotateX(-90deg);
      opacity: 0;
      visibility: hidden;
      transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .body p {
      margin: 0;
      line-height: 1.5;
      opacity: 0.9;
    }
    .accordion.open .body {
      transform: rotateX(0deg);
      opacity: 1;
      visibility: visible;
      margin-top: 10px; 
    }
    .accordion.open .icon {
      transform: rotate(45deg);
    }
    .accordion.open .head {
        border-radius: 12px 12px 0 0;
    }
  </style>
</head>
<body>

<div class="accordion">
    <div class="head">
      <span>Открыть панель</span>
      <span class="icon">+</span>
    </div>

    <div class="body">
      <p>Здесь находится скрытый контент, который появляется с эффектом 3D-разворота.</p>
    </div>
  </div>




  <script>
const acc = document.querySelector('.accordion');

acc.addEventListener('click',()=> {
acc.classList.toggle('open');
});
  </script>
</body>
</html>
